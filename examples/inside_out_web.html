<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>头脑特工队聊天室</title>
<style>
body{font-family:Arial, sans-serif;margin:0;padding:1rem;}
#chat{display:none;}
#messages{border:1px solid #ccc;height:300px;overflow-y:auto;padding:0.5rem;margin-bottom:0.5rem;}
.message{margin:0.25rem 0;}
.name{font-weight:bold;margin-right:0.25rem;}
</style>
</head>
<body>
<div id="setup">
<h2>选择情绪角色</h2>
<div id="bot-options"></div>
<button id="start">进入聊天室</button>
</div>
<div id="chat">
<div id="messages"></div>
<input id="input" placeholder="说点什么..." />
<button id="send">发送</button>
</div>
<script>
let sessionId=null;
async function loadBots(){
  const res=await fetch('/bots');
  const data=await res.json();
  const box=document.getElementById('bot-options');
  data.bots.forEach(name=>{
    const label=document.createElement('label');
    const cb=document.createElement('input');
    cb.type='checkbox';
    cb.value=name;
    cb.checked=true;
    label.appendChild(cb);
    label.append(name);
    label.style.marginRight='1rem';
    box.appendChild(label);
  });
}
async function startChat(){
  const selected=[...document.querySelectorAll('#bot-options input:checked')].map(i=>i.value);
  const res=await fetch('/chat/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agents:selected})});
  const data=await res.json();
  sessionId=data.session_id;
  document.getElementById('setup').style.display='none';
  document.getElementById('chat').style.display='block';
}
function appendMessage(name, content){
  const div=document.createElement('div');
  div.className='message';
  const n=document.createElement('span');
  n.className='name';
  n.textContent=name+':'
  div.appendChild(n);
  div.append(content);
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
}
async function sendMessage(){
  const text=document.getElementById('input').value.trim();
  if(!text)return;
  appendMessage('我', text);
  document.getElementById('input').value='';
  const res=await fetch('/chat/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,message:text})});
  const data=await res.json();
  data.replies.forEach(r=>appendMessage(r.name,r.content));
}
loadBots();
document.getElementById('start').onclick=startChat;
document.getElementById('send').onclick=sendMessage;
document.getElementById('input').addEventListener('keyup',e=>{if(e.key==='Enter')sendMessage();});
</script>
</body>
</html>
